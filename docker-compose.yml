# 面试考点：Docker Compose 编排多服务 — 应用 + Milvus + Prometheus + Grafana 一键启动
#
# 启动方式：
#   开发模式（FAISS，无 Milvus）：docker compose up myrag prometheus grafana
#   生产模式（Milvus）：          docker compose --profile milvus up
#
# Milvus 架构说明（面试考点）：
#   etcd：Milvus 的元数据存储（Collection schema、索引信息）
#   minio：对象存储，存放向量索引文件和日志（WAL）
#   milvus standalone：单机版，包含 proxy + queryNode + indexNode + dataNode

services:
  # === 应用服务 ===
  myrag:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - APP_DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      milvus:
        condition: service_healthy
        required: false  # FAISS 模式下不依赖 Milvus

  # ── Milvus 依赖：etcd（元数据存储）──────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    profiles: ["milvus"]
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── Milvus 依赖：MinIO（对象存储，存放索引文件）──────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    profiles: ["milvus"]
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"   # MinIO Web Console
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── Milvus Standalone（单机版，生产推荐集群版）──────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.15
    profiles: ["milvus"]
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"   # gRPC（SDK 连接端口）
      - "9091:9091"     # HTTP（健康检查 / REST API）
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s  # Milvus 启动较慢，给足时间
    restart: unless-stopped

  # === Prometheus 监控 ===
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - myrag
    restart: unless-stopped

  # === Grafana 可视化 ===
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana_data:
  etcd_data:
  minio_data:
  milvus_data:
