# 面试考点：Docker Compose 编排多服务 — 应用 + Milvus + Prometheus + Grafana 一键启动
#
# 启动方式：
#   仅启动 Milvus 基础设施（本地开发推荐）：
#     docker compose -f docker-compose.milvus.yml up -d
#
#   启动全部服务（含应用 + 监控，FAISS 模式）：
#     docker compose up myrag prometheus grafana
#
#   启动全部服务（含应用 + Milvus + 监控）：
#     docker compose --profile milvus up
#
# Milvus 架构说明（面试考点）：
#   etcd：Milvus 的元数据存储（Collection schema、索引信息）
#   minio：对象存储，存放向量索引文件和日志（WAL）
#   milvus standalone：单机版，包含 proxy + queryNode + indexNode + dataNode
#
# BGE-M3 + Milvus 配置说明：
#   EMBEDDING_MODEL=BAAI/bge-m3  → Dense 向量维度 1024
#   VECTOR_STORE_PROVIDER=milvus → 使用 Milvus 存储
#   VECTOR_STORE_MILVUS_HOST=localhost（本地）或 milvus（容器内互联）

services:
  # === MySQL 关系数据库（元数据存储）===
  # 面试考点：
  #   - utf8mb4 字符集支持完整 Unicode（含 emoji），是 MySQL 中文项目的标准选择
  #   - innodb_buffer_pool_size 控制 InnoDB 缓冲池大小，建议为物理内存的 50%~70%
  #   - 健康检查使用 mysqladmin ping，比 SELECT 1 更轻量
  mysql:
    image: mysql:8.0
    container_name: myrag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: myrag
      MYSQL_USER: myrag
      MYSQL_PASSWORD: myrag123
      # 字符集配置：utf8mb4 + utf8mb4_unicode_ci 是 MySQL 8 的最佳实践
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 自定义配置文件（覆盖默认参数）
      - ./deploy/mysql/my.cnf:/etc/mysql/conf.d/myrag.cnf:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "myrag", "-pmyrag123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # === 应用服务 ===
  myrag:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - APP_DEBUG=false
      # 容器内连接 MySQL 使用服务名 mysql，而非 localhost
      - DATABASE_URL=mysql+aiomysql://myrag:myrag123@mysql:3306/myrag?charset=utf8mb4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_healthy
        required: false  # FAISS 模式下不依赖 Milvus

  # ── Milvus 依赖：etcd（元数据存储）──────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    profiles: ["milvus"]
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── Milvus 依赖：MinIO（对象存储，存放索引文件）──────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    profiles: ["milvus"]
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"   # MinIO Web Console
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── Milvus Standalone（单机版，生产推荐集群版）──────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.15
    profiles: ["milvus"]
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"   # gRPC（SDK 连接端口）
      - "9091:9091"     # HTTP（健康检查 / REST API）
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s  # Milvus 启动较慢，给足时间
    restart: unless-stopped

  # === Prometheus 监控 ===
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - myrag
    restart: unless-stopped

  # === Grafana 可视化 ===
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mysql_data:
  grafana_data:
  etcd_data:
  minio_data:
  milvus_data:
